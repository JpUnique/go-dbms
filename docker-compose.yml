services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: dms_db
      POSTGRES_USER: dms_user
      POSTGRES_PASSWORD: dms_password

    volumes:
      - dms_pgdata:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    ports:
      - "5430:5432"  # dev only

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms_user -d dms_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    volumes:
      - dms_minio:/data

    ports:
      - "9000:9000"
      - "9001:9001"

  clamd:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - dms_clamav:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s   # initial signature download takes time on first run

  backend:
    build: .
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      clamd:
        condition: service_started

    env_file:
      - .env

    environment:
      CLAMAV_URL: "clamd:3310"
      CLAMAV_REQUIRED: "false"   # set true to reject uploads when clamd is unreachable

    ports:
      - "4000:4000"


volumes:
  dms_pgdata:
  dms_minio:
  dms_clamav: