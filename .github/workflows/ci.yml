name: Document Management System

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      # Extract version from tag
      - name: Set VERSION
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Docker login
      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/go-dbms:${{ steps.vars.outputs.VERSION }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/go-dbms:${{ steps.vars.outputs.VERSION }} ${{ secrets.DOCKER_USERNAME }}/go-dbms:latest

      # Push images
      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/go-dbms:${{ steps.vars.outputs.VERSION }}
          docker push ${{ secrets.DOCKER_USERNAME }}/go-dbms:latest
